name: Deploy React Frontend to UCD Server

on:
  push:
    branches: 
      - deployment, deployment-2
  pull_request:
    branches:
      - deployment, deployment-2

jobs:
  deploy: # job 1: build npm 
    runs-on: ubuntu-latest

    steps:
    - name: Deploy and update frontend via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          cd /home/student/Group5/COMP47360_Summer_Project_Group5/app/
          git pull origin deployment-2
          docker compose down
          docker compose build --no-cache
          docker compose up -d
          sudo systemctl restart nginx
